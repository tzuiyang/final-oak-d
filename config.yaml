object_follower:
  ros__parameters:
    # Path to the YOLO blob — relative paths are resolved from the node's script dir.
    model_blob_path: "models/yolov8n_coco_640x352.blob"

    # Stop when the target is within this distance (meters)
    target_distance: 0.4

    # Proportional gains
    k_forward: 0.8
    k_yaw: 1.2

    # Output clamps (keep modest so the default walking policy stays stable)
    max_forward_vel: 0.5
    max_yaw_vel: 1.5

    # Stop if we lose the target for this many consecutive frames
    timeout_frames: 10

    # cmd_vel_mux expects one of: /teleop_cmd_vel, /llm_cmd_vel, /person_following_cmd_vel
    # Using the lowest-priority input so teleop can always preempt for safety.
    cmd_vel_topic: "/person_following_cmd_vel"

mission_controller:
  ros__parameters:
    # Angular half-width (radians) of the "path corridor" checked for obstacles.
    corridor_half_width_rad: 0.25

    # How much closer than the target an object must be (meters) to count as blocking.
    obstacle_clearance_m: 0.2

    # How often the "standing still — visible: ..." menu is logged.
    print_period_s: 2.0

    # How often the path-clear check is re-evaluated.
    evaluate_period_s: 0.2
