<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OAK-D Follow Demo</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #111;
    color: #eee;
    margin: 0;
    padding: 24px;
  }
  h1 { font-size: 18px; font-weight: 500; margin: 0 0 16px; }
  .wrap {
    display: inline-block;
    position: relative;
    border: 1px solid #333;
    background: #000;
  }
  #stream {
    display: block;
    max-width: 100%;
    cursor: crosshair;
  }
  .bar {
    margin-top: 14px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .pill {
    padding: 4px 10px;
    border-radius: 4px;
    background: #222;
    border: 1px solid #333;
  }
  .pill.ok { color: #6f6; border-color: #3a6; }
  .pill.err { color: #f88; border-color: #844; }
  button {
    font: inherit;
    padding: 5px 12px;
    background: #222;
    color: #eee;
    border: 1px solid #444;
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover { background: #2a2a2a; }
  .hint { color: #888; font-size: 12px; margin-top: 4px; }
</style>
</head>
<body>
  <h1>OAK-D follow demo — click an object to follow, click empty space to stop</h1>
  <div class="wrap">
    <img id="stream" src="/stream.mjpg" alt="OAK-D stream">
  </div>
  <div class="bar">
    <span id="status" class="pill">standing still</span>
    <span id="path" class="pill">depth: waiting</span>
    <button id="stopBtn">stop</button>
    <span id="error" class="pill err" style="display:none"></span>
  </div>
  <div class="hint">Tip: green box = engaged target, amber box = detected but not selected.</div>

<script>
  const img = document.getElementById('stream');
  const statusEl = document.getElementById('status');
  const pathEl = document.getElementById('path');
  const errorEl = document.getElementById('error');
  const stopBtn = document.getElementById('stopBtn');

  function setStatus(text, kind) {
    statusEl.textContent = text;
    statusEl.classList.remove('ok', 'err');
    if (kind) statusEl.classList.add(kind);
  }

  img.addEventListener('click', async (ev) => {
    const r = img.getBoundingClientRect();
    const x = (ev.clientX - r.left) / r.width;
    const y = (ev.clientY - r.top) / r.height;
    const res = await fetch('/select', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({x, y}),
    });
    const body = await res.json();
    if (body.disengaged) {
      setStatus('stopped (no object at click)');
    } else if (body.ok) {
      setStatus(`requested: ${body.class_name}`, 'ok');
    }
  });

  stopBtn.addEventListener('click', async () => {
    await fetch('/disengage', {method: 'POST'});
    setStatus('stopped');
  });

  async function pollState() {
    try {
      const r = await fetch('/state');
      const s = await r.json();
      const p = s.path_clear || {};
      if (p.valid && p.nearest_obstacle_m !== null && p.nearest_obstacle_m !== undefined) {
        pathEl.textContent = `depth: ${Number(p.nearest_obstacle_m).toFixed(2)}m`;
        pathEl.classList.add('ok');
        pathEl.classList.remove('err');
      } else {
        pathEl.textContent = `depth: ${p.reason || 'waiting'}`;
        pathEl.classList.add('err');
        pathEl.classList.remove('ok');
      }
      if (s.error) {
        errorEl.style.display = '';
        errorEl.textContent = s.error;
      } else {
        errorEl.style.display = 'none';
      }
    } catch (e) { /* transient; retry next tick */ }
  }
  setInterval(pollState, 1000);
  pollState();
</script>
</body>
</html>
